<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Browser</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --fleet: #f78166;
    --mp: #d2a8ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 1200px;
    margin: 0 auto;
    -webkit-text-size-adjust: 100%;
  }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; -webkit-tap-highlight-color: transparent; }
  .logo:hover .logo-icon { filter: brightness(1.2); }
  .logo-icon { width: 36px; height: 36px; flex-shrink: 0; }
  .logo-text { font-size: 1.4em; font-weight: 700; color: var(--text); }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap #search { width: 100%; padding-right: 36px; }
  .clear-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--dim); font-size: 18px;
    cursor: pointer; padding: 4px 6px; line-height: 1; display: none;
    -webkit-appearance: none;
  }
  .clear-btn.visible { display: block; }
  .header-count { color: var(--dim); font-size: 13px; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  #search {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  .filter-btn {
    padding: 8px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--dim);
    cursor: pointer;
    font-size: 14px;
    -webkit-appearance: none;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  .count { color: var(--dim); font-size: 13px; margin-bottom: 12px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover, .card:active { border-color: var(--accent); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .card-name { font-weight: 600; font-size: 15px; color: var(--accent); }
  .badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge.fleet { background: rgba(247,129,102,0.15); color: var(--fleet); }
  .badge.marketplace { background: rgba(210,168,255,0.15); color: var(--mp); }
  .card-desc {
    font-size: 13px;
    color: var(--dim);
    line-height: 1.4;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .triggers { display: flex; flex-wrap: wrap; gap: 4px; }
  .trigger-tag {
    font-size: 11px;
    padding: 2px 6px;
    background: rgba(88,166,255,0.1);
    color: var(--accent);
    border-radius: 4px;
  }
  .doc-indicators { display: flex; gap: 4px; flex-shrink: 0; }
  .doc-dot {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(63,185,80,0.15);
    color: var(--green);
    font-weight: 500;
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .overlay.open { display: block; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 700px;
    width: calc(100% - 32px);
    margin: 40px auto;
    padding: 20px;
  }
  .modal-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .modal h2 { font-size: 1.2em; color: var(--accent); margin-bottom: 2px; }
  .close-x {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .modal-meta { font-size: 12px; color: var(--dim); margin-bottom: 12px; }
  .modal-desc { font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
  .tmpl-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    padding-top: 40px;
    margin-bottom: 12px;
    position: relative;
    min-height: 80px;
  }
  .tmpl-box pre {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 8px 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    -webkit-appearance: none;
  }
  .copy-btn.ok { background: var(--green); }
  .docs-btn {
    display: inline-block;
    cursor: pointer;
    color: var(--dim);
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    margin-bottom: 8px;
    margin-right: 6px;
    -webkit-appearance: none;
  }
  .docs-box {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .docs-box.show { display: block; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    body { padding: 10px; }
    .modal { margin: 10px auto; padding: 14px; }
    .copy-btn { padding: 10px 20px; font-size: 15px; }
  }
</style>
</head>
<body>

<div class="header">
  <a class="logo" id="logo">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <path d="M8 12h5l2.5-3h5L23 12h5" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="9" y="14" width="18" height="13" rx="2" stroke="#58a6ff" stroke-width="1.5"/>
      <circle cx="14.5" cy="20.5" r="2" fill="#f78166"/>
      <circle cx="21.5" cy="20.5" r="2" fill="#d2a8ff"/>
      <line x1="14.5" y1="20.5" x2="21.5" y2="20.5" stroke="#3fb950" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">Skill Browser</span>
  </a>
  <span class="header-count" id="total"></span>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search skills...">
    <button class="clear-btn" id="clear-search">&times;</button>
  </div>
  <button class="filter-btn active" data-f="all">All</button>
  <button class="filter-btn" data-f="fleet">Fleet</button>
  <button class="filter-btn" data-f="marketplace">Marketplace</button>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<div class="overlay" id="overlay"></div>

<script>
var S=[], F='all';

function load(){
  fetch('skills.json').then(function(r){return r.json()}).then(function(d){
    S=d.skills;
    document.getElementById('total').textContent=S.length+' skills';
    render();
  });
}

function render(){
  var q=document.getElementById('search').value.toLowerCase();
  var list=S.filter(function(s){
    if(F!=='all'&&s.source!==F)return false;
    if(!q)return true;
    return s.name.toLowerCase().indexOf(q)>=0||
      s.description.toLowerCase().indexOf(q)>=0||
      (s.triggers||[]).some(function(t){return t.toLowerCase().indexOf(q)>=0});
  });
  document.getElementById('count').textContent=list.length+' of '+S.length;
  var g=document.getElementById('grid');
  g.textContent='';
  list.forEach(function(s){
    var c=document.createElement('div');
    c.className='card';
    var idx=S.indexOf(s);
    c.setAttribute('data-i',idx);
    c.addEventListener('click',function(){open_skill(idx)});

    var h=document.createElement('div');h.className='card-header';
    var n=document.createElement('span');n.className='card-name';n.textContent='@'+s.name;
    var b=document.createElement('span');b.className='badge '+s.source;b.textContent=s.source;
    h.appendChild(n);h.appendChild(b);c.appendChild(h);

    var d=document.createElement('div');d.className='card-desc';d.textContent=s.description;
    c.appendChild(d);

    var footer=document.createElement('div');footer.className='card-footer';

    var tr=document.createElement('div');tr.className='triggers';
    if(s.triggers&&s.triggers.length){
      s.triggers.slice(0,4).forEach(function(t){
        var tg=document.createElement('span');tg.className='trigger-tag';tg.textContent=t;
        tr.appendChild(tg);
      });
    }
    footer.appendChild(tr);

    var has_docs=s.how_to_use||s.readme||s.skill_guide;
    if(has_docs){
      var dots=document.createElement('div');dots.className='doc-indicators';
      if(s.how_to_use){var dd=document.createElement('span');dd.className='doc-dot';dd.textContent='HOW TO';dots.appendChild(dd)}
      if(s.readme){var dr=document.createElement('span');dr.className='doc-dot';dr.textContent='README';dots.appendChild(dr)}
      if(s.skill_guide){var ds=document.createElement('span');ds.className='doc-dot';ds.textContent='GUIDE';dots.appendChild(ds)}
      footer.appendChild(dots);
    }
    c.appendChild(footer);
    g.appendChild(c);
  });
}

function open_skill(i){
  var s=S[i];
  var tmpl=s.template||'[Describe what you need]';
  var txt='@'+s.name+'\n\n'+tmpl;

  var ov=document.getElementById('overlay');
  ov.textContent='';ov.classList.add('open');

  var m=document.createElement('div');m.className='modal';

  var top=document.createElement('div');top.className='modal-top';
  var ti=document.createElement('h2');ti.textContent='@'+s.name;
  var x=document.createElement('button');x.className='close-x';x.textContent='\u00D7';
  x.addEventListener('click',close_modal);
  top.appendChild(ti);top.appendChild(x);m.appendChild(top);

  var meta=document.createElement('div');meta.className='modal-meta';
  meta.textContent=s.source+' skill';m.appendChild(meta);

  var desc=document.createElement('div');desc.className='modal-desc';
  desc.textContent=s.description;m.appendChild(desc);

  var box=document.createElement('div');box.className='tmpl-box';
  var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';
  cb.addEventListener('click',function(){do_copy(cb,txt)});
  var pre=document.createElement('pre');pre.textContent=txt;
  box.appendChild(cb);box.appendChild(pre);m.appendChild(box);

  function add_doc_section(label, content) {
    var db=document.createElement('button');db.className='docs-btn';db.textContent=label;
    var dc=document.createElement('div');dc.className='docs-box';dc.textContent=content;
    db.addEventListener('click',function(){
      dc.classList.toggle('show');
      db.textContent=dc.classList.contains('show')?'Hide '+label.replace('Show ',''):label;
    });
    m.appendChild(db);m.appendChild(dc);
  }

  if(s.how_to_use) add_doc_section('Show How To Use', s.how_to_use);
  if(s.readme) add_doc_section('Show README', s.readme);
  if(s.skill_guide) add_doc_section('Show Skill Guide', s.skill_guide);

  ov.appendChild(m);
}

function close_modal(){document.getElementById('overlay').classList.remove('open')}

function do_copy(btn,txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){ok(btn)}).catch(function(){fallback(btn,txt)});
  }else{fallback(btn,txt)}
}
function fallback(btn,txt){
  var ta=document.createElement('textarea');ta.value=txt;
  ta.style.cssText='position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');ok(btn)}catch(e){}
  document.body.removeChild(ta);
}
function ok(btn){
  btn.textContent='Copied!';btn.classList.add('ok');
  setTimeout(function(){btn.textContent='Copy';btn.classList.remove('ok')},2000);
}

var searchEl=document.getElementById('search');
var clearBtn=document.getElementById('clear-search');
function updateClear(){clearBtn.classList.toggle('visible',searchEl.value.length>0)}
searchEl.addEventListener('input',function(){render();updateClear()});
clearBtn.addEventListener('click',function(){searchEl.value='';updateClear();render();searchEl.focus()});
document.getElementById('logo').addEventListener('click',function(e){
  e.preventDefault();searchEl.value='';updateClear();
  F='all';document.querySelectorAll('.filter-btn').forEach(function(x){x.classList.remove('active')});
  document.querySelector('[data-f="all"]').classList.add('active');
  render();window.scrollTo(0,0);
});
document.querySelectorAll('.filter-btn').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.filter-btn').forEach(function(x){x.classList.remove('active')});
    b.classList.add('active');F=b.getAttribute('data-f');render();updateClear();
  });
});
document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===e.currentTarget)close_modal();
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')close_modal()});

load();
</script>
</body>
</html>
